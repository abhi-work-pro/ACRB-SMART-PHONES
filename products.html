<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | ACRB Smart Phones</title>

    <link rel="stylesheet" href="css/products.css">
</head>
<body>

<header>
    <h1>📱 ACRB Smart Phones</h1>
</header>

<!-- Products Section -->
<section class="products">

    <div class="card">
        <img src="images/iphone16.jpg" alt="">
        <h3>iPhone 16</h3>
        <p>₹79,999</p>
        <button onclick="addToCart('iPhone 16', 79999)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/s24.jpg" alt="">
        <h3>Samsung S24</h3>
        <p>₹64,999</p>
        <button onclick="addToCart('Samsung S24', 64999)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="images/realme.jpg" alt="">
        <h3>Realme GT</h3>
        <p>₹29,999</p>
        <button onclick="addToCart('Realme GT', 29999)">Add to Cart</button>
    </div>

</section>

<script src="js/products.js"></script>

</body>
</html>
